<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 850" width="600" height="850">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8B6914" stop-opacity="0.85"/>
      <stop offset="35%" stop-color="#4A3810" stop-opacity="0.92"/>
      <stop offset="100%" stop-color="#2A1F0A" stop-opacity="0.95"/>
    </linearGradient>
    <!-- Cracked earth pattern -->
    <pattern id="cracks" width="120" height="120" patternUnits="userSpaceOnUse">
      <rect width="120" height="120" fill="none"/>
      <path d="M0 60 Q30 55 60 60 Q90 65 120 60" stroke="rgba(139,105,20,0.15)" stroke-width="1" fill="none"/>
      <path d="M60 0 Q55 30 60 60 Q65 90 60 120" stroke="rgba(139,105,20,0.12)" stroke-width="1" fill="none"/>
      <path d="M20 20 Q40 35 50 50" stroke="rgba(139,105,20,0.1)" stroke-width="0.8" fill="none"/>
      <path d="M80 30 Q70 50 90 80" stroke="rgba(139,105,20,0.1)" stroke-width="0.8" fill="none"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="600" height="850" fill="#3D2B0F"/>
  <rect width="600" height="850" fill="url(#cracks)"/>
  <rect width="600" height="850" fill="url(#bg-grad)"/>

  <!-- Blue header bar -->
  <rect x="0" y="0" width="600" height="36" fill="#4A90B8"/>
  <text x="300" y="24" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="700" font-family="Arial, sans-serif" letter-spacing="3">GLOBAL WATER MONITORING REPORT</text>

  <!-- Main title -->
  <text x="300" y="420" text-anchor="middle" fill="#ffffff" font-size="52" font-weight="900" font-family="Arial, Helvetica, sans-serif" letter-spacing="2">CONTINENTAL DRYING</text>
  <text x="300" y="490" text-anchor="middle" fill="#ffffff" font-size="30" font-weight="300" font-family="Georgia, serif" font-style="italic">A Threat to Our Common Future</text>

  <!-- Divider line -->
  <line x1="180" x2="420" y1="520" y2="520" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>

  <!-- Authors -->
  <text x="300" y="555" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="11" font-style="italic" font-family="Georgia, serif">Fan Zhang, Christian Borja-Vega, Hrishikesh Arvind Chandanpurkar,</text>
  <text x="300" y="572" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="11" font-style="italic" font-family="Georgia, serif">James Famiglietti, Rick Hogeboom, Regassa Namara, Zarif Rasul,</text>
  <text x="300" y="589" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="11" font-style="italic" font-family="Georgia, serif">Pavel Luengas-Sierra, and Deyu Rao</text>

  <!-- WB Logo area -->
  <g transform="translate(40, 770)">
    <circle cx="20" cy="20" r="18" fill="none" stroke="rgba(255,255,255,0.8)" stroke-width="1.5"/>
    <path d="M10 15 Q15 10 20 15 Q25 10 30 15" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="1"/>
    <path d="M10 20 Q15 15 20 20 Q25 15 30 20" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="1"/>
    <path d="M10 25 Q15 20 20 25 Q25 20 30 25" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="1"/>
    <text x="48" y="28" fill="rgba(255,255,255,0.85)" font-size="14" font-weight="700" font-family="Arial, sans-serif" letter-spacing="1">WORLD BANK GROUP</text>
  </g>
</svg>
